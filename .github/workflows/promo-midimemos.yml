name: promo-midimemos
on:
  workflow_dispatch:
    inputs:
      caption:
        description: "Caption for the framed clip"
        default: "Capture a musical idea in one tap."

jobs:
  promo:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout promo-factory (harness)
        uses: actions/checkout@v4
        with: { path: factory }

      - name: Auth git for private repos (FLEET_PAT)
        run: |
          git config --global url."https://x-access-token:${{ secrets.FLEET_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout fleet repos as siblings (local-path SPM deps resolve)
        run: |
          mkdir -p fleet && cd fleet
          git clone --depth 1 -b promo-capture-proof https://github.com/e7mac/midi-memos.git
          git clone --depth 1 -b main https://github.com/e7mac/MusicCore.git
          git clone --depth 1 -b main https://github.com/e7mac/PromoKit.git

      - name: Select newest installed Xcode
        run: |
          echo "Available:"; ls -d /Applications/Xcode_*.app 2>/dev/null || true
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Install tooling (xcodegen, ffmpeg/ffprobe, Pillow)
        run: |
          brew install xcodegen ffmpeg
          python3 -m pip install --break-system-packages --quiet pillow

      - name: Generate + build (simulator, no signing)
        run: |
          echo "Xcode: $(xcodebuild -version | tr '\n' ' ')"
          cd fleet/midi-memos
          xcodegen generate
          set -o pipefail
          xcodebuild build -scheme MidiMemos \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/build.log | grep -E "error:|BUILD SUCCEEDED|BUILD FAILED" || true
          echo "=== compiler errors (if any) ==="; grep -E "error:" /tmp/build.log | sort -u | head -25 || true
          grep -q "BUILD SUCCEEDED" /tmp/build.log

      - name: Boot sim + capture + frame
        run: |
          UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-7] " | grep -oE '[0-9A-F-]{36}' | head -1)
          xcrun simctl boot "$UDID" || true; xcrun simctl bootstatus "$UDID" -b
          # Open the Simulator GUI so the launched app actually foregrounds in the recorded
          # framebuffer (headless simctl-only launch leaves the home screen showing).
          open -a Simulator --args -CurrentDeviceUDID "$UDID" || true
          sleep 12
          APP=$(cd fleet/midi-memos && xcodebuild -scheme MidiMemos -destination "id=$UDID" -showBuildSettings 2>/dev/null | awk -F' = ' '/ CODESIGNING_FOLDER_PATH/{print $2}')
          echo "APP=$APP"; xcrun simctl install "$UDID" "$APP"
          export PROMO_ROOT="$PWD/promo-out"; mkdir -p "$PROMO_ROOT/raw"
          S=factory/scripts; BUNDLE=com.e7mac.midimemos
          xcrun simctl privacy "$UDID" grant all "$BUNDLE" 2>/dev/null || true
          xcrun simctl status_bar "$UDID" override --time "9:41" --batteryState charged \
            --batteryLevel 100 --cellularBars 4 --wifiBars 3 --dataNetwork wifi 2>/dev/null || true
          # start recording, then a NORMAL (foreground) launch so the app's UI actually shows
          xcrun simctl io "$UDID" recordVideo --codec h264 --force "$PROMO_ROOT/raw/midimemos_video.mp4" & RP=$!
          SIMCTL_CHILD_PROMO_DEMO=1 xcrun simctl launch "$UDID" "$BUNDLE"
          CT=$(xcrun simctl get_app_container "$UDID" "$BUNDLE" data)
          sleep 4; xcrun simctl io "$UDID" screenshot "$PROMO_ROOT/raw/launch_check.png" 2>/dev/null || true   # foreground check (mid-scene)
          # Fixed record window: comfortably covers the runner's slow launch (~2-4s) + the
          # ~6s scene + margin. The app finalizes scene.wav/scene.markers itself at scene-end;
          # frameclip trims to the scene via the clapperboard. (The marker poll stopped early.)
          sleep 16
          kill -INT $RP 2>/dev/null || true
          for i in $(seq 1 20); do kill -0 $RP 2>/dev/null || break; sleep 0.5; done
          kill -KILL $RP 2>/dev/null || true
          xcrun simctl terminate "$UDID" "$BUNDLE" 2>/dev/null || true
          cp "$CT/Documents/scene.wav" "$PROMO_ROOT/raw/midimemos_audio.wav"
          cp "$CT/Documents/scene.markers" "$PROMO_ROOT/raw/midimemos.markers"
          echo "--- markers ---"; grep '@PROMO' "$PROMO_ROOT/raw/midimemos.markers" || true
          python3 $S/verify.py "$PROMO_ROOT/raw/midimemos.markers" "$PROMO_ROOT/raw/midimemos_audio.wav" || echo "verify nonzero (continuing)"
          PROMO_CONFIG=$S/cloud.config.sh zsh $S/frameclip.sh \
            "$PROMO_ROOT/raw/midimemos_video.mp4" "$PROMO_ROOT/raw/midimemos_audio.wav" \
            "${{ inputs.caption }}" "$PROMO_ROOT/midimemos_promo.mp4"
          ls -la "$PROMO_ROOT/midimemos_promo.mp4"

      - name: Upload raw capture (always, for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midimemos-raw
          path: |
            promo-out/raw/midimemos_video.mp4
            promo-out/raw/midimemos_audio.wav
            promo-out/raw/midimemos.markers
            promo-out/raw/launch_check.png
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: midimemos-promo
          path: promo-out/midimemos_promo.mp4
          if-no-files-found: error
